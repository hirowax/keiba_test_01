<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>netkeiba タイム指数</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; color: #1a1a1a; }

  header {
    background: #1a3a5c;
    color: white;
    padding: 14px 16px;

    align-items: center;

  header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }

  .next-pickup-label { font-size: 0.7rem; color: #bbb; padding: 5px 14px 2px; font-weight: 600; }

  .pace-S { background: #ffe0e0; color: #cc2200; }
  .pace-H { background: #e0f0ff; color: #0044aa; }

  .horse-pick-row {

  }
  .horse-pick-row:last-child { border-bottom: none; }
  .pick-sub { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-top: 3px; }
  .pick-score {

  /* ── 3指数重複馬タブ ── */

  .index-group { margin-bottom: 10px; }

  .rank-dot {

  /* ── 注目馬PUタブ ── */
  .pu-filter {
    background: white; border-radius: 12px;
    padding: 10px 14px; margin-bottom: 10px;

  .pu-btn {
    flex: 1; border: none; border-radius: 8px;
    padding: 8px 4px; font-size: 0.82rem; font-weight: 700;

  .pu-btn.active-5 { background: #e8a000; }

  .pu-meta { font-size: 0.72rem; color: #aaa; margin-top: 6px; }

  .scored-card {

    overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08);

  }
  .scored-header {
    display: flex; align-items: center; padding: 10px 14px; gap: 8px;
    border-bottom: 1px solid #f0f0f0;
  }
  .scored-info { flex: 1; min-width: 0; }
  .scored-name { font-weight: 700; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .race-tag {
    background: #1a3a5c; color: white;
    border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; font-weight: 700;

  .triple-idx span { background: #f5f5f5; border-radius: 3px; padding: 1px 5px; }

  .score-badge {

  .pts-badge {

  /* ── 新バッジ類 ── */
  .axis-badge {
    background: #0077aa; color: white;
    border-radius: 4px; padding: 1px 6px; font-size: 0.68rem; font-weight: 700;
    white-space: nowrap;
  }
  .anaba-badge {

  }

<body>

<header>
  <h1>🏇 タイム指数</h1>
  <select id="date-select"></select>
</header>

<div id="auth-overlay" style="display:none;position:fixed;inset:0;background:#1a3a5c;z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:white;border-radius:16px;padding:32px 24px;width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.4)">
    <div style="font-size:2rem;margin-bottom:8px">🏇</div>
    <div style="font-weight:700;font-size:1.1rem;margin-bottom:20px;color:#1a3a5c">タイム指数</div>
    <input id="pw-input" type="password" placeholder="パスワード"
      style="width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:1rem;margin-bottom:10px;box-sizing:border-box"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="color:#cc4400;font-size:0.82rem;height:18px;margin-bottom:6px"></div>
    <button onclick="checkPw()"
      style="width:100%;padding:10px;background:#1a3a5c;color:white;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer">
      入る
    </button>
  </div>
</div>

<div id="loading"><div class="spinner"></div><p>データ読み込み中...</p></div>
<div id="content"></div>

<script>
// ── 認証 ──────────────────────────────────────────────────────
const PW_HASH = 'f96b73d67716ce9637b7e692ee6e24da3b3edd1832babfb9adaf254e22a93b40';
const AUTH_KEY = 'keiba_auth';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const hash = await sha256(val);
  if (hash === PW_HASH) {
    localStorage.setItem(AUTH_KEY, '1');
    document.getElementById('auth-overlay').style.display = 'none';
    initDates();
  } else {
    document.getElementById('pw-error').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value = '';
  }
}

if (localStorage.getItem(AUTH_KEY) === '1') {
  document.getElementById('auth-overlay').style.display = 'none';
} else {
  document.getElementById('auth-overlay').style.display = 'flex';
}

// ── 定数 ──────────────────────────────────────────────────────
const VENUE_ORDER = ['東京','中山','京都','阪神','中京','新潟','福島','函館','札幌','小倉'];
let EV_THRESHOLD = 5; // 期待値🔥閾値（APIから上書き）

function venueRank(v) {
  const i = VENUE_ORDER.indexOf(v);
  return i >= 0 ? i : 99;
}
function raceNumOf(label) {
  const m = String(label).match(/(\d+)R/);
  return m ? parseInt(m[1]) : 0;
}
function sortVenueDesc(entries) {
  // entries: [[venue, ...], ...]
  return entries.sort((a, b) => venueRank(a[0]) - venueRank(b[0]));
}
function sortRaceDesc(races) {
  // races: [{label, ...}, ...]
  return [...races].sort((a, b) => raceNumOf(b.label) - raceNumOf(a.label));
}
function sortRaceLabelDesc(labelMap) {
  // {raceLabel: data} → sorted entries [[label, data], ...]
  return Object.entries(labelMap).sort((a, b) => raceNumOf(b[0]) - raceNumOf(a[0]));
}

// ── データロード ──────────────────────────────────────────────
let currentData = null;
let currentPickup = null;
let currentResults = null; // race_results.json: { "中山10R": [{num, rank, odds, ...}] }

async function loadDate(date) {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').innerHTML = '';
  const [triple, summary, pickup, cfg, results] = await Promise.all([
    fetch(`output/${date}/triple.json`).then(r => r.json()).catch(() => []),
    fetch(`summary/${date}.json`).then(r => r.json()).catch(() => ({})),
    fetch(`output/${date}/pickup_scores.json`).then(r => r.json()).catch(() => null),
    fetch('output/threshold_config.json').then(r => r.json()).catch(() => null),
    fetch(`output/${date}/race_results.json`).then(r => r.ok ? r.json() : null).catch(() => null),
  ]);
  if (cfg?.ev_threshold) EV_THRESHOLD = cfg.ev_threshold;
  currentData = { triple, summary };
  currentPickup = pickup;
  // 馬番→着順マップを構築: { "中山10R": { "5": {rank:1, odds:9.3} } }
  currentResults = {};
  if (results) {
    for (const [label, horses] of Object.entries(results)) {
      currentResults[label] = {};
      for (const h of horses) {
        currentResults[label][String(h.num)] = { rank: h.rank, odds: h.odds };
      }
    }
  }
  document.getElementById('loading').style.display = 'none';
  render(date, cfg);
}

function resultBadge(raceLabel, num) {
  if (!currentResults || !currentResults[raceLabel]) return '';
  const r = currentResults[raceLabel][String(num)];
  if (!r || !r.rank) return '';
  const styles = {
    1: 'background:#c8a000;color:white',
    2: 'background:#888;color:white',
    3: 'background:#a05020;color:white',
  };
  const style = styles[r.rank] || 'background:#ddd;color:#666';
  const oddsStr = r.rank <= 3 ? ` ${r.odds}倍` : '';
  return `<span style="${style};border-radius:3px;padding:0 5px;font-size:0.65rem;font-weight:700;flex-shrink:0">${r.rank}着${oddsStr}</span>`;
}

function renderThresholdBadge(cfg) {
  if (!cfg?.ev_threshold) return '';
  const stats = cfg.stats || {};
  const t = String(cfg.ev_threshold);
  const s = stats[t];
  const rateStr = s ? `（過去${s.count}頭中${s.hit3}頭 3着内 ${Math.round(s.rate*100)}%）` : '';
  const datesStr = cfg.dates_used?.length ? `検証: ${cfg.dates_used.join(', ')}` : '';
  return `
    <div style="background:#f0f4f8;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:0.78rem;color:#555;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span>🔥 期待値閾値: <strong>${cfg.ev_threshold}pt以上</strong> ${rateStr}</span>
      <span style="color:#aaa">${datesStr}</span>
    </div>`;
}

// ── メインレンダー ────────────────────────────────────────────
function render(date, cfg) {
  const { triple, summary } = currentData;
  document.getElementById('content').innerHTML = `
    ${renderThresholdBadge(cfg)}
    ${renderTopPickup()}
    ${renderVenueSection(triple, summary)}
  `;
}


// ── 最注目馬 + 次点 ──────────────────────────────────────────
function renderTopPickup() {
  if (!currentPickup?.races) return '';

  const sortFn = (a, b) => {
    const vd = venueRank(a.venue||'') - venueRank(b.venue||'');
    if (vd !== 0) return vd;
    const rd = raceNumOf(b.race_label) - raceNumOf(a.race_label);
    if (rd !== 0) return rd;
    return b.score - a.score;
  };

  const top = [], next = [];
  for (const [label, rdata] of Object.entries(currentPickup.races)) {
    for (const h of (rdata.scored || [])) {
      const e = {...h, race_label: label};
      if (h.score >= EV_THRESHOLD)           top.push(e);
      else if (h.score >= EV_THRESHOLD - 2)  next.push(e);
    }
  }
  if (!top.length && !next.length) return '';
  top.sort(sortFn); next.sort(sortFn);

  const makeRow = (h, isNext) => {
    const pop = parseInt(h.today_pop || '0');
    const isAnaba = pop >= 5;
    const popStr = h.today_pop ? `<span class="pop-badge${isAnaba?' low':''}">${h.today_pop}人気</span>` : '';
    const rb2 = resultBadge(h.race_label, h['馬番']);
    if (isNext) return `
      <div class="next-row">
        <span class="tp-race" style="font-size:0.75rem;color:#aaa;padding-top:2px">${h.race_label}</span>
        <span class="horse-num" style="width:20px;height:20px;font-size:0.72rem;flex-shrink:0;background:#bbb;margin-top:1px">${h['馬番']}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.85rem;font-weight:600;color:#888">${h['馬名']}</div>
          <div class="tp-sub">${popStr}${rb2}</div>
        </div>
        <span class="next-score">${h.score}pt</span>
      </div>`;
    const rb = resultBadge(h.race_label, h['馬番']);
    return `
      <div class="top-pickup-row">
        <span class="tp-race">${h.race_label}</span>
        <span class="horse-num" style="width:24px;height:24px;font-size:0.78rem;flex-shrink:0;margin-top:1px">${h['馬番']}</span>
        <div style="flex:1;min-width:0">
          <span class="tp-name">${h['馬名']}</span>
          <div class="tp-sub">${popStr}${rb}</div>
        </div>
        <span class="tp-score">${h.score}pt</span>
      </div>`;
  };

  const topRows  = top.map(h => makeRow(h, false)).join('');
  const nextRows = next.length ? `
    <div class="next-pickup">
      <div class="next-pickup-label">次点（${EV_THRESHOLD-2}〜${EV_THRESHOLD-1}pt）</div>
      ${next.map(h => makeRow(h, true)).join('')}
    </div>` : '';

  return `
    <div class="top-pickup">
      <div class="top-pickup-header">
        🏆 最注目馬（${EV_THRESHOLD}pt以上）
        <span style="background:rgba(0,0,0,0.2);border-radius:10px;padding:1px 8px;font-size:0.78rem">${top.length}頭</span>
      </div>
      ${topRows || '<div style="padding:10px 14px;color:#bbb;font-size:0.85rem">該当馬なし</div>'}
      ${nextRows}
    </div>`;
}

// ── 開催場タブ ────────────────────────────────────────────────
function renderVenueSection(triple, summary) {
  const venueSet = new Set();
  if (currentPickup?.races) {
    for (const rdata of Object.values(currentPickup.races)) {
      if (rdata.venue) venueSet.add(rdata.venue);
    }
  }
  triple.forEach(h => venueSet.add(h['開催場']));
  Object.keys(summary || {}).forEach(v => venueSet.add(v));

  const venues = [...venueSet].sort((a,b) => venueRank(a) - venueRank(b));
  if (!venues.length) return '<p class="empty" style="padding:16px">データなし</p>';

  const tabBtns = venues.map((v, i) =>
    `<button class="venue-tab-btn${i===0?' active':''}" onclick="switchVenueTab(this,'vtab-${v}')">${v}</button>`
  ).join('');

  const panels = venues.map((v, i) =>
    `<div id="vtab-${v}" class="tab-panel${i===0?' active':''}">${renderVenuePanel(v, triple, summary)}</div>`
  ).join('');

  return `<div class="venue-tabs">${tabBtns}</div>${panels}`;
}

function renderVenuePanel(venue, triple, summary) {
  // pickup からレース別データを収集
  const raceMap = {};
  if (currentPickup?.races) {
    for (const [label, rdata] of Object.entries(currentPickup.races)) {
      if (rdata.venue !== venue) continue;
      raceMap[label] = { scored: rdata.scored || [], rdata };
    }
  }
  // triple からも補完（pickup未処理レース対応）
  triple.filter(h => h['開催場'] === venue).forEach(h => {
    const label = `${venue}${h['レース番号']}`;
    if (!raceMap[label]) raceMap[label] = { scored: [], rdata: null };
  });

  const labels = Object.keys(raceMap).sort((a,b) => raceNumOf(b) - raceNumOf(a));
  if (!labels.length) return '<p class="empty" style="padding:16px">データなし</p>';

  // summary から単指数1位マップ
  const singleMap = buildSingleTopMap(summary);

  return labels.map(label => {
    const { scored, rdata } = raceMap[label];
    const singles = singleMap[`${venue}_${label.replace(venue,'')}`] || [];
    return renderRaceCard(label, venue, scored, singles, rdata);
  }).join('');
}

function renderRaceCard(label, venue, scored, singles, rdata) {
  const rn = label.replace(venue, '');
  const dist  = rdata?.race_dist ? `${rdata.race_dist}m` : '';
  const pace  = rdata?.predicted_pace || '';
  const distBadge = dist ? `<span class="dist-badge">${dist}</span>` : '';
  const paceBadge = pace ? `<span class="pace-badge pace-${pace}">${pace}</span>` : '';

  // スコア降順でソート（0ptは非表示）
  const sortedScored = [...scored].filter(h => h.score > 0).sort((a,b) => b.score - a.score);

  const horseRows = sortedScored.map(h => {
    const pop = parseInt(h.today_pop || '0');
    const isAnaba = h.score >= EV_THRESHOLD && pop >= 5;
    const popStr = h.today_pop ? `<span class="pop-badge${isAnaba?' low':''}" style="font-size:0.7rem">${h.today_pop}人気</span>` : '';
    const evBadge = h.score >= EV_THRESHOLD
      ? `<span style="background:#e8a000;color:white;border-radius:3px;padding:0 5px;font-size:0.65rem;font-weight:700">🔥</span>` : '';
    const sc = h.score >= EV_THRESHOLD ? '' : h.score >= 3 ? 'mid' : 'low';
    const factors = (h.breakdown||[]).map(b=>`<span>${b.label}</span>`).join('');
    const raceNum = raceNumOf(label);
    const sanko = raceNum >= 1 && raceNum <= 3 ? `<span class="sanko-badge">参考</span>` : '';
    const rb = resultBadge(label, h['馬番']);
    return `
      <div class="horse-pick-row">
        <span class="horse-num" style="width:24px;height:24px;font-size:0.78rem;flex-shrink:0;margin-top:1px">${h['馬番']}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:0.9rem;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
            ${h['馬名']}${evBadge}${sanko}
          </div>
          <div class="pick-sub">
            ${popStr}${rb}
            ${factors ? `<div class="pick-factors" style="margin-top:0">${factors}</div>` : ''}
          </div>
        </div>
        <span class="pick-score ${sc}">${h.score}pt</span>
      </div>`;
  }).join('');

  // 穴馬ライン（前走1-2着 + idx80+ + 5-10番人気）
  const anabaRows = (rdata?.anaba || []).map(a => {
    return `
      <div class="horse-pick-row" style="background:#fff8f4">
        <span class="horse-num" style="width:24px;height:24px;font-size:0.78rem;flex-shrink:0;background:#cc4400;margin-top:1px">${a.num}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:0.88rem">${a.name}</div>
          <div class="pick-sub">
            <span class="pop-badge low" style="font-size:0.7rem">${a.pop}人気</span>
            <span class="pick-factors" style="margin-top:0"><span>前走${a.prev_rank}着 指数${a.prev_idx}</span></span>
          </div>
        </div>
        <span class="anaba-badge">穴</span>
      </div>`;
  }).join('');

  // 単指数1位馬（3指数重複外）
  const singleRows = singles.map(s => {
    const badges = s.strong.map(lb =>
      `<span style="background:#8855cc;color:white;border-radius:3px;padding:0 4px;font-size:0.63rem">${lb}</span>`
    ).join(' ');
    return `
      <div class="horse-pick-row" style="background:#faf7ff">
        <span class="horse-num" style="width:24px;height:24px;font-size:0.78rem;flex-shrink:0;background:#8855cc;margin-top:1px">${s.num}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.88rem;font-weight:600">${s.name}</div>
          <div class="pick-sub">${badges}</div>
        </div>
        <span style="font-size:0.7rem;color:#8855cc;font-weight:700;flex-shrink:0;padding-top:2px">単指数1位</span>
      </div>`;
  }).join('');

  if (!horseRows && !singleRows && !anabaRows) return '';

  return `
    <div class="race-card">
      <div class="race-card-hd">
        <span>${rn}</span>${distBadge}${paceBadge}
      </div>
      ${horseRows}${anabaRows}${singleRows}
    </div>`;
}

// ── ユーティリティ ────────────────────────────────────────────
function switchVenueTab(btn, tabId) {
  document.querySelectorAll('.venue-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// ── 単指数1位マップ（summary から） ──────────────────────────
function buildSingleTopMap(summary) {
  const map = {};
  if (!summary) return map;
  for (const [venue, races] of Object.entries(summary)) {
    for (const race of races) {
      const key = `${venue}_${race.label}`;
      const tripleNames = new Set((race.triple || []).map(h => h.name));
      const seen = new Set();
      const singles = [];
      for (const cat of [{key:'average',label:'近走平均'},{key:'distance',label:'当該距離'},{key:'course',label:'当該コース'}]) {
        const top = (race[cat.key] || [])[0];
        if (!top || tripleNames.has(top.name)) continue;
        if (seen.has(top.name)) {
          singles.find(s => s.name === top.name)?.strong.push(cat.label);
          continue;
        }
        seen.add(top.name);
        singles.push({ num: top.num, name: top.name, strong: [cat.label] });
      }
      if (singles.length) map[key] = singles;
    }
  }
  return map;
}

// 初期ロード（dates.json から日付一覧を取得）
async function initDates() {
  const dates = await fetch('output/dates.json').then(r => r.json()).catch(() => []);
  const sel = document.getElementById('date-select');
  sel.innerHTML = dates.map(d =>
    `<option value="${d}">${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6)}</option>`
  ).join('');
  sel.addEventListener('change', e => loadDate(e.target.value));
  if (sel.value) loadDate(sel.value);
}
if (localStorage.getItem(AUTH_KEY) === '1') initDates();
